<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIZE. — Token</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050505; color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.header-left { display: flex; align-items: center; gap: 12px; }
.back-btn { width: 36px; height: 36px; border-radius: 18px; background: #141414; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; text-decoration: none; font-size: 18px; }
.token-name { font-size: 18px; font-weight: 800; }
.token-ticker { color: #E8500A; font-size: 14px; font-weight: 600; }

.layout { display: flex; height: calc(100vh - 57px); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sidebar { width: 340px; border-left: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; overflow-y: auto; }

/* Stats bar */
.stats { display: flex; padding: 12px 16px; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.stat { flex: 1; text-align: center; border-right: 1px solid rgba(255,255,255,0.06); padding: 0 8px; }
.stat:last-child { border-right: none; }
.stat-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: #505050; text-transform: uppercase; }
.stat-value { font-size: 16px; font-weight: 800; color: #f5f5f5; margin-top: 2px; }
.stat-value.green { color: #10b981; }
.stat-value.red { color: #ef4444; }

/* Chart */
.chart-wrap { flex: 1; min-height: 300px; background: #0d0d0d; position: relative; }
.chart-wrap iframe { width: 100%; height: 100%; border: none; }
.chart-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #505050; }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.06); }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 700; color: #505050; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #E8500A; border-bottom-color: #E8500A; }

/* Transactions */
.txn-table { flex: 1; overflow-y: auto; }
.txn-row { display: flex; padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; align-items: center; }
.txn-row:hover { background: rgba(255,255,255,0.02); }
.txn-time { color: #505050; width: 80px; }
.txn-type { width: 50px; font-weight: 700; }
.txn-type.buy { color: #10b981; }
.txn-type.sell { color: #ef4444; }
.txn-amount { flex: 1; text-align: right; }
.txn-usd { width: 80px; text-align: right; color: #a0a0a0; }
.txn-maker { width: 100px; text-align: right; color: #505050; font-family: monospace; font-size: 11px; }

/* Sidebar sections */
.sidebar-section { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.sidebar-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: #505050; margin-bottom: 8px; }
.token-img { width: 48px; height: 48px; border-radius: 12px; background: #141414; }
.token-info-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.token-info-name { font-size: 16px; font-weight: 800; }
.token-info-sub { font-size: 12px; color: #a0a0a0; }

.price-big { font-size: 28px; font-weight: 900; color: #f5f5f5; }
.mcap-big { font-size: 16px; color: #a0a0a0; font-weight: 600; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px; }
.info-card-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: #505050; }
.info-card-value { font-size: 14px; font-weight: 800; margin-top: 2px; }

/* Buy/Sell */
.trade-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.trade-tab { flex: 1; padding: 8px; text-align: center; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; background: #141414; color: #a0a0a0; border: 1px solid rgba(255,255,255,0.06); }
.trade-tab.active-buy { background: rgba(16,185,129,0.15); color: #10b981; border-color: rgba(16,185,129,0.3); }
.trade-tab.active-sell { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.3); }

.swap-embed { border-radius: 12px; overflow: hidden; background: #0d0d0d; }
.swap-embed iframe { width: 100%; height: 360px; border: none; }

/* Circle Jerk */
.cj-header { display: flex; align-items: center; justify-content: space-between; }
.cj-badge { font-size: 9px; font-weight: 800; letter-spacing: 1px; padding: 3px 8px; border-radius: 999px; border: 1px solid rgba(232,80,10,0.4); color: #E8500A; }
.cj-messages { max-height: 200px; overflow-y: auto; }
.cj-msg { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.cj-msg-user { font-size: 11px; font-weight: 700; color: #E8500A; }
.cj-msg-text { font-size: 12px; color: #a0a0a0; margin-top: 2px; }
.cj-input-row { display: flex; gap: 8px; margin-top: 8px; }
.cj-input { flex: 1; background: #0d0d0d; border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; padding: 8px 14px; color: #fff; font-size: 12px; outline: none; }
.cj-send { width: 36px; height: 36px; border-radius: 18px; background: #E8500A; border: none; color: #050505; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.enter-cj-btn { display: block; width: 100%; padding: 12px; text-align: center; background: #E8500A; color: #050505; font-weight: 800; font-size: 14px; border-radius: 10px; border: none; cursor: pointer; margin-top: 8px; text-decoration: none; }

/* Mobile */
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); max-height: 50vh; }
  .chart-wrap { min-height: 250px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="back-btn">&larr;</a>
    <div>
      <div class="token-name" id="token-name">Loading...</div>
      <div class="token-ticker" id="token-ticker"></div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="main">
    <!-- Stats -->
    <div class="stats">
      <div class="stat"><div class="stat-label">Price</div><div class="stat-value" id="price">--</div></div>
      <div class="stat"><div class="stat-label">Market Cap</div><div class="stat-value" id="mcap">--</div></div>
      <div class="stat"><div class="stat-label">24h Vol</div><div class="stat-value" id="vol">--</div></div>
      <div class="stat"><div class="stat-label">Holders</div><div class="stat-value" id="holders">--</div></div>
      <div class="stat"><div class="stat-label">24h</div><div class="stat-value" id="change">--</div></div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap" id="chart-container">
      <div class="chart-loading">Loading chart...</div>
    </div>

    <!-- Tabs: Transactions / Holders -->
    <div class="tabs">
      <div class="tab active" onclick="showTab('txns')">Transactions</div>
      <div class="tab" onclick="showTab('holders')">Holders</div>
    </div>
    <div class="txn-table" id="txn-table">
      <div class="txn-row" style="color:#505050; text-align:center; padding:40px;">Transactions will appear when the token launches on Uniswap</div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Token info -->
    <div class="sidebar-section">
      <div class="token-info-row">
        <img class="token-img" id="token-img" src="" alt="" />
        <div>
          <div class="token-info-name" id="sidebar-name">--</div>
          <div class="token-info-sub" id="sidebar-creator">by @--</div>
        </div>
      </div>
      <div class="price-big" id="sidebar-price">--</div>
      <div class="mcap-big" id="sidebar-mcap">--</div>
    </div>

    <!-- Info grid -->
    <div class="sidebar-section">
      <div class="info-grid">
        <div class="info-card"><div class="info-card-label">Liquidity</div><div class="info-card-value" id="liquidity">--</div></div>
        <div class="info-card"><div class="info-card-label">Holders</div><div class="info-card-value" id="sidebar-holders">--</div></div>
        <div class="info-card"><div class="info-card-label">Age</div><div class="info-card-value" id="age">--</div></div>
        <div class="info-card"><div class="info-card-label">Vol 24h</div><div class="info-card-value" id="sidebar-vol">--</div></div>
      </div>
    </div>

    <!-- Buy/Sell -->
    <div class="sidebar-section">
      <div class="sidebar-label">TRADE</div>
      <div class="swap-embed">
        <iframe id="swap-iframe" src="" allow="clipboard-write"></iframe>
      </div>
    </div>

    <!-- Circle Jerk -->
    <div class="sidebar-section">
      <div class="cj-header">
        <div class="sidebar-label" style="margin-bottom:0">CIRCLE JERK</div>
        <div class="cj-badge" id="cj-members">0 members</div>
      </div>
      <div class="cj-messages" id="cj-messages">
        <div style="color:#505050; font-size:12px; padding:20px 0; text-align:center;">No messages yet</div>
      </div>
      <a class="enter-cj-btn" id="enter-cj-btn" href="#">Enter Circle Jerk</a>
    </div>
  </div>
</div>

<script>
// Get token address from URL
const path = window.location.pathname;
const coinAddress = path.split('/coin/')[1] || path.split('/circle-jerk/')[1] || '';

// Load token data
async function loadToken() {
  if (!coinAddress) { document.getElementById('token-name').textContent = 'Token not found'; return; }

  try {
    const res = await fetch('/api/v1/dickcoins/' + coinAddress);
    if (!res.ok) { document.getElementById('token-name').textContent = 'Token not found'; return; }
    const coin = await res.json();

    // Populate UI
    document.getElementById('token-name').textContent = coin.name || 'Unknown';
    document.getElementById('token-ticker').textContent = coin.ticker || '';
    document.getElementById('sidebar-name').textContent = coin.name || '';
    document.getElementById('sidebar-creator').textContent = 'by @' + (coin.creatorUsername || 'unknown');
    if (coin.imageUrl) document.getElementById('token-img').src = coin.imageUrl;
    document.getElementById('holders').textContent = coin.holderCount || '0';
    document.getElementById('sidebar-holders').textContent = coin.holderCount || '0';
    document.getElementById('cj-members').textContent = (coin.holderCount || 0) + ' members';
    document.getElementById('enter-cj-btn').href = '/circle-jerk/' + coinAddress;

    // Set title
    document.title = 'SIZE. — ' + (coin.name || 'Token');

    // Set up Uniswap swap iframe
    const swapUrl = 'https://app.uniswap.org/#/swap?outputCurrency=' + coinAddress + '&chain=base&theme=dark';
    document.getElementById('swap-iframe').src = swapUrl;

    // Load messages
    const token = localStorage.getItem('size_token');
    if (token) {
      const msgRes = await fetch('/api/v1/circle-jerks/' + coinAddress + '/messages', {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (msgRes.ok) {
        const msgs = await msgRes.json();
        const container = document.getElementById('cj-messages');
        if (msgs.length > 0) {
          container.innerHTML = msgs.slice(0, 20).map(m =>
            '<div class="cj-msg"><span class="cj-msg-user">@' + (m.senderUsername || '?') + '</span><div class="cj-msg-text">' + (m.content || '') + '</div></div>'
          ).join('');
        }
      }
    }

    // Age calculation
    if (coin.createdAt) {
      const age = Date.now() - new Date(coin.createdAt).getTime();
      const hours = Math.floor(age / 3600000);
      const days = Math.floor(hours / 24);
      document.getElementById('age').textContent = days > 0 ? days + 'd' : hours + 'h';
    }

  } catch (e) {
    console.error('Failed to load token:', e);
    document.getElementById('token-name').textContent = 'Error loading token';
  }
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}

loadToken();
</script>

</body>
</html>
