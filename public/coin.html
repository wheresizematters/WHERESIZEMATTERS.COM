<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIZE. — Token</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050505; color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
.header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.back-btn { width: 36px; height: 36px; border-radius: 18px; background: #141414; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; text-decoration: none; font-size: 18px; }
.token-header { display: flex; align-items: center; gap: 10px; flex: 1; }
.token-img { width: 32px; height: 32px; border-radius: 8px; background: #141414; }
.token-name { font-size: 18px; font-weight: 800; }
.token-ticker { color: #E8500A; font-size: 13px; font-weight: 600; }
.layout { display: flex; height: calc(100vh - 57px); }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.sidebar { width: 340px; border-left: 1px solid rgba(255,255,255,0.06); overflow-y: auto; }
.stats { display: flex; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.stat { flex: 1; text-align: center; }
.stat-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: #505050; }
.stat-value { font-size: 15px; font-weight: 800; margin-top: 2px; }
.green { color: #10b981; }
.red { color: #ef4444; }
.chart-wrap { flex: 1; min-height: 300px; }
.chart-wrap iframe { width: 100%; height: 100%; border: none; }
.section { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.section-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: #505050; margin-bottom: 8px; }
.price-big { font-size: 28px; font-weight: 900; }
.mcap-line { font-size: 14px; color: #a0a0a0; margin-top: 2px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.info-card { background: #0d0d0d; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px; }
.info-card-label { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: #505050; }
.info-card-value { font-size: 14px; font-weight: 800; margin-top: 2px; }
.swap-embed iframe { width: 100%; height: 360px; border: none; border-radius: 12px; }
.cj-btn { display: block; width: 100%; padding: 12px; text-align: center; background: #E8500A; color: #050505; font-weight: 800; font-size: 14px; border-radius: 10px; border: none; cursor: pointer; text-decoration: none; }
.cj-messages { max-height: 180px; overflow-y: auto; margin: 8px 0; }
.cj-msg { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
.cj-msg-user { font-size: 11px; font-weight: 700; color: #E8500A; }
.cj-msg-text { font-size: 12px; color: #a0a0a0; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: #505050; }
@media (max-width: 768px) { .layout { flex-direction: column; } .sidebar { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.06); } }
</style>
</head>
<body>
<div class="header">
  <a href="/explore" class="back-btn">←</a>
  <div class="token-header">
    <img class="token-img" id="token-img" src="" />
    <div>
      <span class="token-name" id="token-name">Loading...</span>
      <span class="token-ticker" id="token-ticker"></span>
    </div>
  </div>
</div>
<div class="layout">
  <div class="main">
    <div class="stats" id="stats-bar">
      <div class="stat"><div class="stat-label">PRICE</div><div class="stat-value" id="price">--</div></div>
      <div class="stat"><div class="stat-label">MCAP</div><div class="stat-value" id="mcap">--</div></div>
      <div class="stat"><div class="stat-label">24H VOL</div><div class="stat-value" id="vol">--</div></div>
      <div class="stat"><div class="stat-label">HOLDERS</div><div class="stat-value" id="holders">--</div></div>
      <div class="stat"><div class="stat-label">24H</div><div class="stat-value" id="change">--</div></div>
    </div>
    <div class="chart-wrap">
      <iframe id="chart-iframe" src=""></iframe>
    </div>
  </div>
  <div class="sidebar">
    <div class="section">
      <div class="price-big" id="sidebar-price">--</div>
      <div class="mcap-line" id="sidebar-mcap">--</div>
    </div>
    <div class="section">
      <div class="info-grid">
        <div class="info-card"><div class="info-card-label">LIQUIDITY</div><div class="info-card-value" id="liquidity">--</div></div>
        <div class="info-card"><div class="info-card-label">HOLDERS</div><div class="info-card-value" id="sidebar-holders">--</div></div>
        <div class="info-card"><div class="info-card-label">SUPPLY</div><div class="info-card-value" id="supply">--</div></div>
        <div class="info-card"><div class="info-card-label">VOL 24H</div><div class="info-card-value" id="sidebar-vol">--</div></div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">TRADE</div>
      <div class="swap-embed"><iframe id="swap-iframe" src="" allow="clipboard-write"></iframe></div>
    </div>
    <div class="section">
      <div class="section-label">CIRCLE JERK</div>
      <div class="cj-messages" id="cj-messages"><div class="loading">Loading...</div></div>
      <a class="cj-btn" id="cj-btn" href="#">Enter Circle Jerk</a>
    </div>
  </div>
</div>
<script>
const CODEX_KEY = '79de2a116cac57f758349fa67ea5db22dafd19ec';
const BASE_CHAIN = 8453;
const addr = window.location.pathname.split('/coin/')[1] || '';

function fmt(n) { if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B'; if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M'; if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K'; return '$' + n.toFixed(0); }
function fmtPrice(n) { if (n < 0.0001) return '$' + n.toExponential(2); if (n < 1) return '$' + n.toFixed(6); return '$' + n.toFixed(2); }

async function load() {
  if (!addr) { document.getElementById('token-name').textContent = 'Token not found'; return; }

  // Codex API
  const res = await fetch('https://graph.codex.io/graphql', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': CODEX_KEY },
    body: JSON.stringify({ query: `{ token(input: { address: "${addr}", networkId: ${BASE_CHAIN} }) { name symbol decimals totalSupply info { circulatingSupply imageThumbUrl imageLargeUrl } } filterTokens(filters: { network: [${BASE_CHAIN}] }, tokens: ["${addr}"]) { results { priceUSD liquidity marketCap volume24 holders change24 pair { address } } } }` })
  });
  const { data } = await res.json();
  const t = data?.token;
  const m = data?.filterTokens?.results?.[0];

  if (t) {
    document.title = 'SIZE. — ' + t.name;
    document.getElementById('token-name').textContent = t.name;
    document.getElementById('token-ticker').textContent = t.symbol;
    if (t.info?.imageThumbUrl) document.getElementById('token-img').src = t.info.imageThumbUrl;
    document.getElementById('supply').textContent = t.totalSupply ? Math.round(parseFloat(t.totalSupply)).toLocaleString() : '--';
  }

  if (m) {
    const price = parseFloat(m.priceUSD || 0);
    const mcap = parseFloat(m.marketCap || 0);
    const vol = parseFloat(m.volume24 || 0);
    const liq = parseFloat(m.liquidity || 0);
    const holders = m.holders || 0;
    const change = parseFloat(m.change24 || 0) * 100;

    document.getElementById('price').textContent = fmtPrice(price);
    document.getElementById('mcap').textContent = fmt(mcap);
    document.getElementById('vol').textContent = fmt(vol);
    document.getElementById('holders').textContent = holders.toLocaleString();
    const changeEl = document.getElementById('change');
    changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
    changeEl.className = 'stat-value ' + (change >= 0 ? 'green' : 'red');

    document.getElementById('sidebar-price').textContent = fmtPrice(price);
    document.getElementById('sidebar-mcap').textContent = 'MCap ' + fmt(mcap);
    document.getElementById('liquidity').textContent = fmt(liq);
    document.getElementById('sidebar-holders').textContent = holders.toLocaleString();
    document.getElementById('sidebar-vol').textContent = fmt(vol);

    // DexScreener chart embed
    if (m.pair?.address) {
      document.getElementById('chart-iframe').src = 'https://dexscreener.com/base/' + m.pair.address + '?embed=1&theme=dark&info=0&trades=0';
    }
  }

  // Uniswap swap
  document.getElementById('swap-iframe').src = 'https://app.uniswap.org/#/swap?outputCurrency=' + addr + '&chain=base&theme=dark';

  // Circle Jerk
  document.getElementById('cj-btn').href = '/circle-jerk/' + addr;
  try {
    const cjRes = await fetch('/api/v1/circle-jerks/' + addr + '/messages');
    if (cjRes.ok) {
      const msgs = await cjRes.json();
      const container = document.getElementById('cj-messages');
      container.innerHTML = msgs.length ? msgs.slice(0, 10).map(m => '<div class="cj-msg"><span class="cj-msg-user">@' + (m.senderUsername || '?') + '</span><div class="cj-msg-text">' + (m.content || '') + '</div></div>').join('') : '<div style="color:#505050;text-align:center;padding:20px;font-size:12px;">No messages yet</div>';
    }
  } catch {}
}

load();
</script>
</body>
</html>
