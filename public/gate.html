<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIZE. — Invite Only</title>
<meta name="description" content="SIZE. is invite only. Pre-register with X. Follow @wheresize for updates.">
<link rel="canonical" href="https://www.wheresizematters.com">
<meta property="og:type" content="website">
<meta property="og:title" content="SIZE. — Invite Only">
<meta property="og:description" content="The social platform where you prove it, flex it, and earn from it. Pre-register now.">
<meta property="og:url" content="https://www.wheresizematters.com">
<meta property="og:image" content="https://www.wheresizematters.com/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@wheresize">
<meta name="twitter:title" content="SIZE. — Pre-Register Now">
<meta name="twitter:description" content="The social platform where you prove it, flex it, and earn from it. Pre-register with X.">
<meta name="twitter:image" content="https://www.wheresizematters.com/og-image.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .w {
    text-align: center;
    margin-top: -40px;
    max-width: 400px;
    padding: 0 24px;
  }
  .logo {
    font-size: 52px;
    font-weight: 900;
    color: #E8500A;
    letter-spacing: 14px;
    margin-bottom: 12px;
  }
  .tagline {
    color: #444;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 36px;
  }

  /* Pre-register button */
  .prereg-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 24px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    margin-bottom: 12px;
  }
  .prereg-btn:hover { background: #eee; transform: translateY(-1px); }
  .prereg-btn svg { flex-shrink: 0; }

  .prereg-sub {
    color: #333;
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .waitlist-count {
    color: #E8500A;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 24px;
    display: none;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #222;
    margin: 0 auto 24px;
  }

  .links {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .links a {
    color: #333;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.3s;
  }
  .links a:hover { color: #E8500A; }

  .code-toggle {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #1a1a1a;
    font-size: 10px;
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 2px;
    padding: 8px;
    transition: color 0.3s;
  }
  .code-toggle:hover { color: #333; }

  .code-form {
    display: none;
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    gap: 8px;
    align-items: center;
  }
  .code-form.show { display: flex; }
  .code-input {
    padding: 10px 14px;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 8px;
    outline: none;
    width: 160px;
    text-align: center;
  }
  .code-input:focus { border-color: #E8500A; }
  .code-input::placeholder { color: #333; letter-spacing: 2px; font-size: 13px; }
  .code-btn {
    padding: 10px 16px;
    background: #E8500A;
    color: #0A0A0A;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
  }
  .code-btn:disabled { opacity: 0.5; }
  .err {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #FF453A;
    font-size: 11px;
    display: none;
  }
</style>
</head>
<body>
<div class="w">
  <div class="logo">SIZE.</div>
  <div class="tagline">Verify everything. Get ranked. Earn from it.<br>The social platform where size matters.</div>

  <div class="waitlist-count" id="wc"></div>

  <a href="/api/v1/auth/oauth/x/redirect" class="prereg-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    Pre-register with X
  </a>
  <div class="prereg-sub">Reserve your spot. Get early access when we launch.</div>

  <div class="divider"></div>

  <div class="links">
    <a href="https://x.com/wheresize" target="_blank">@wheresize</a>
    <a href="/whitepaper">whitepaper</a>
  </div>
</div>

<button class="code-toggle" onclick="document.getElementById('cf').classList.toggle('show');document.getElementById('c').focus()">enter code</button>
<form id="cf" class="code-form" onsubmit="return go(event)">
  <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" class="code-input" id="c" placeholder="000000" autocomplete="off">
  <button type="submit" class="code-btn" id="sb">Go</button>
</form>
<div class="err" id="e">Invalid code.</div>
<script>
function go(e) {
  e.preventDefault();
  var code = document.getElementById('c').value.trim();
  if (code.length !== 6) return false;
  var btn = document.getElementById('sb');
  btn.disabled = true;
  btn.textContent = '...';
  fetch('/api/v1/analytics/verify-totp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: code })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.valid) {
      document.cookie = 'size_access=1;path=/;max-age=315360000;SameSite=Lax';
      location.reload();
    } else {
      document.getElementById('e').style.display = 'block';
      document.getElementById('c').value = '';
      document.getElementById('c').focus();
      setTimeout(function() { document.getElementById('e').style.display = 'none'; }, 2000);
    }
    btn.disabled = false;
    btn.textContent = 'Go';
  })
  .catch(function() { btn.disabled = false; btn.textContent = 'Go'; });
  return false;
}
// Gate auto-bypass
fetch('/api/v1/analytics/gate-status').then(function(r){return r.json()}).then(function(d){
  if(!d.enabled){document.cookie='size_access=1;path=/;max-age=315360000;SameSite=Lax';location.reload()}
}).catch(function(){});
// Waitlist count
fetch('/api/v1/profiles/count').then(function(r){return r.json()}).then(function(d){
  var count = d.count || 0;
  if(count > 0) {
    var el = document.getElementById('wc');
    el.textContent = count + ' people on the waitlist';
    el.style.display = 'block';
  }
}).catch(function(){});
</script>
<script>
fetch('/api/v1/analytics/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page:location.pathname,referrer:document.referrer||'',screenWidth:screen.width,screenHeight:screen.height,language:navigator.language||'',timezone:Intl.DateTimeFormat().resolvedOptions().timeZone||''})}).catch(function(){});
</script>
</body>
</html>
