<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIZE.</title>
<meta property="og:title" content="SIZE.">
<meta property="og:description" content="Invite only.">
<meta property="og:image" content="https://wheresizematters.com/og-image.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0A0A0A;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .w {
    text-align: center;
    margin-top: -60px;
  }
  .logo {
    font-size: 52px;
    font-weight: 900;
    color: #E8500A;
    letter-spacing: 14px;
    margin-bottom: 48px;
  }
  .line {
    color: #333;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .x {
    margin-top: 2px;
  }
  .x a {
    color: #444;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.3s;
  }
  .x a:hover { color: #E8500A; }

  .code-toggle {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #1a1a1a;
    font-size: 10px;
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 2px;
    padding: 8px;
    transition: color 0.3s;
  }
  .code-toggle:hover { color: #333; }

  .code-form {
    display: none;
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    gap: 8px;
    align-items: center;
  }
  .code-form.show { display: flex; }
  .code-input {
    padding: 10px 14px;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 8px;
    outline: none;
    width: 160px;
    text-align: center;
  }
  .code-input:focus { border-color: #E8500A; }
  .code-input::placeholder { color: #333; letter-spacing: 2px; font-size: 13px; }
  .code-btn {
    padding: 10px 16px;
    background: #E8500A;
    color: #0A0A0A;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
  }
  .code-btn:disabled { opacity: 0.5; }
  .err {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #FF453A;
    font-size: 11px;
    display: none;
  }
</style>
</head>
<body>
<div class="w">
  <div class="logo">SIZE.</div>
  <div class="line">Invite Only</div>
  <div class="x"><a href="https://x.com/wheresize" target="_blank">@wheresize</a></div>
</div>
<button class="code-toggle" onclick="document.getElementById('cf').classList.toggle('show');document.getElementById('c').focus()">enter code</button>
<form id="cf" class="code-form" onsubmit="return go(event)">
  <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" class="code-input" id="c" placeholder="000000" autocomplete="off">
  <button type="submit" class="code-btn" id="sb">Go</button>
</form>
<div class="err" id="e">Invalid code.</div>
<script>
function go(e) {
  e.preventDefault();
  var code = document.getElementById('c').value.trim();
  if (code.length !== 6) return false;
  var btn = document.getElementById('sb');
  btn.disabled = true;
  btn.textContent = '...';
  fetch('/api/v1/analytics/verify-totp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: code })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.valid) {
      document.cookie = 'size_access=1;path=/;max-age=315360000;SameSite=Lax';
      location.reload();
    } else {
      document.getElementById('e').style.display = 'block';
      document.getElementById('c').value = '';
      document.getElementById('c').focus();
      setTimeout(function() { document.getElementById('e').style.display = 'none'; }, 2000);
    }
    btn.disabled = false;
    btn.textContent = 'Go';
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Go';
  });
  return false;
}
</script>
<script>
// Check if gate is disabled — auto-enter if so
fetch('/api/v1/analytics/gate-status').then(function(r){return r.json()}).then(function(d){
  if(!d.enabled){document.cookie='size_access=1;path=/;max-age=315360000;SameSite=Lax';location.reload()}
}).catch(function(){});
</script>
<script>
fetch('/api/v1/analytics/track',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page:location.pathname,referrer:document.referrer||'',screenWidth:screen.width,screenHeight:screen.height,language:navigator.language||'',timezone:Intl.DateTimeFormat().resolvedOptions().timeZone||''})}).catch(function(){});
</script>
</body>
</html>
